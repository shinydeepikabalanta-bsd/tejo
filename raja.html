<!DOCTYPE html>
<html>
<head>
<h1 class="entry">SNAKE GAME</h1>
<link rel="stylesheet" href="janu.css">
</head>
<body>

<label class="entry" for="username-input">Username:</label>
<input class="entry" id="username-input" type="text" placeholder="Enter username..." maxlength="20" />
<button class="entry" id="start-btn" disabled>Start</button>


<script src="aksh.js"></script>
</body>
<div>
<head>
  
</head>
<body>

  <h1>Snake</h1>

  <div class="game-wrapper">

    <div class="scoreboard">
      <div class="score-box">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="score-box">
        <span>Best</span>
        <strong id="best">0</strong>
      </div>
    </div>

    <!-- Game canvas with grid overlay -->
    <div class="canvas-container">
      <canvas id="gameCanvas" width="1600" height="900"></canvas>
      <div class="grid-overlay"></div>
    </div>

    <p class="controls">Arrow Keys / WASD to move &nbsp;|&nbsp; Press Enter to start</p>

  </div>

</body>
</div>
</html>
